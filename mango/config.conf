# !!! LOOK AT ALL 'change this', CHANGE IF NEEDED THEN ** DELETE THE COMMENT!!!!! **, THE LINE WONT WORK WITH IT THERE FOR SOME REASON!!!!!!!
# ========================
# AUTOSTART
# ========================
monitorrule=name:^DP-1$,width:2560,height:1440,refresh:165,x:0,y:0,vrr:1
monitorrule=name:^DP-2$,width:2560,height:1440,refresh:165,x:2560,y:0,vrr:1
exec-once=dbus-update-activation-environment --all
exec-once=dms run -d # change this NOW !! i have NO idea how to start dms, i do not use it. i found this on the web so CHANGE IT!
#exec-once=blueman-applet # These two were in my config, if u use them then uncomment them.
#exec-once=nm-applet --indicator # ^

# ========================
# CUSTOMIZATION
# ========================
focuscolor=0xffb2b9ff # change this
bordercolor=0x9f8c8dff # change this
urgentcolor=0xffb4abff # change this
shadowscolor=0x00000070 # change this
borderpx=3
border_radius=8
blur=1
blur_params_num_passes=3
blur_params_radius=5
layerrule=blur,quickshell
new_is_master=0
drag_tile_to_tile=1
focused_opacity=1.0
unfocused_opacity=0.80

# ========================
# MISCELLANEOUS
# ========================
focus_cross_monitor=1
exchange_cross_monitor=1

# ========================
# INPUT
# ========================
repeat_rate=25
repeat_delay=360
accel_profile=0
sloppyfocus=1
warpcursor=1

# ========================
# LAYOUT
# ========================
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller
scroller_focus_center=1
scroller_proportion_preset=0.33,0.5,0.66,1.0

# ========================
# WINDOW RULES
# ========================
windowrule=focused_opacity:1.0,appid:.*
windowrule=unfocused_opacity:0.80,appid:.*

# ========================
# BINDS
# ========================
bind=SUPER,Return,spawn,foot
bind=SUPER,D,spawn,rofi -show drun
bind=SUPER,Q,killclient
bind=SUPER,O,toggleoverview
bind=SUPER,S,spawn_shell,grim - | wl-copy
bind=SUPER+SHIFT,S,spawn_shell,grim -g "$(slurp)" - | wl-copy
bind=NONE,XF86AudioRaiseVolume,spawn_shell,wpctl set-volume @DEFAULT_SINK@ 0.1+
bind=NONE,XF86AudioLowerVolume,spawn_shell,wpctl set-volume @DEFAULT_SINK@ 0.1-
bind=NONE,XF86AudioMute,spawn_shell,wpctl set-mute @DEFAULT_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn_shell,wpctl set-mute @DEFAULT_SOURCE@ toggle
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioStop,spawn,playerctl stop
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl --class=backlight set +10%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl --class=backlight set 10%-

# ========================
# WINDOW MANAGEMENT
# ========================
bind=SUPER,Left,focusstack,prev
bind=SUPER,Right,focusstack,next
bind=SUPER,H,focusstack,prev
bind=SUPER,L,focusstack,next
bind=SUPER,Up,scroller_stack,up # change this OR remove this, i saw it in ur niri but idk what it does
bind=SUPER,Down,scroller_stack,down # change this as above ^
bind=SUPER,K,scroller_stack,up # change this as above ^
bind=SUPER,J,scroller_stack,down # change this as above ^
bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,Down,exchange_client,down
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,Right,exchange_client,right
bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,L,exchange_client,right
bind=SUPER,M,togglemaximizescreen
bind=SUPER+SHIFT,M,togglefullscreen
bind=SUPER,Space,togglefloating
bind=SUPER,R,switch_proportion_preset
bind=SUPER,W,centerwin
bind=SUPER,C,switch_layout
bind=SUPER,Minus,set_proportion,-1 # change this since it does NOT work right so.. if u made it in ur existing config just replace it
bind=SUPER,Equal,set_proportion,+1 # change this ^
bind=SUPER,B,focusmon,right
bind=SUPER+SHIFT,B,tagmon,right

# ========================
# SESSION
# ========================
bind=CTRL+ALT,Delete,quit
bind=SUPER+SHIFT,P,disable_monitor,DP-1 # change this since i have no idea if u still use this, imo it seems annoying
bind=SUPER+SHIFT,P,disable_monitor,DP-2 # change this ^
bind=SUPER+SHIFT,R,reload_config

# ========================
# TAGS / WORKSPACES
# ========================
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9
bind=SUPER,U,viewtoleft
bind=SUPER,I,viewtoright
bind=SUPER+SHIFT,U,tagtoleft
bind=SUPER+SHIFT,I,tagtoright

# ========================
# MOUSE
# ========================
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
